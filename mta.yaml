_schema-version: '3.2'
ID: odx-fullstack
version: 0.2.0
description: ODX OData Developer Experience - Standalone AppRouter Setup

parameters:
  enable-parallel-deployments: true
  # HIER KONFIGURIEREN: Die Subdomain Ihres BTP Subaccounts (Overview -> Subdomain)
  # Für DEV/PROD überschreiben Sie diesen Wert in einer .mtaext Datei.
  xsuaa-subdomain: abap-development-bechtle-test

modules:
  # 1. GATEKEEPER: AppRouter
  - name: odx-approuter
    type: nodejs
    path: packages/approuter
    requires:
      - name: odx-xsuaa
      - name: odx-destination
      - name: odx-proxy-url
        group: destinations
        properties:
          name: odx-proxy-backend
          url: ~{url}
          forwardAuthToken: true
      - name: odx-explorer-url
        group: destinations
        properties:
          name: odx-explorer-ui
          url: ~{url}
          forwardAuthToken: true
    parameters:
      memory: 128M
      buildpack: nodejs_buildpack
      # Wir setzen den Hostnamen so, dass er mit der Subdomain beginnt
      host: ${xsuaa-subdomain}-odx
    build-parameters:
      ignore:
        - node_modules/
    properties:
      # Dieser RegEx sorgt dafür, dass der AppRouter den Tenant korrekt an XSUAA sendet
      TENANT_HOST_PATTERN: '^(.*)-odx.cfapps.(.*).hana.ondemand.com'

  # 2. BACKEND: OData Proxy
  - name: odx-proxy
    type: nodejs
    path: packages/proxy/.output
    provides:
      - name: odx-proxy-url
        properties:
          url: ${default-url}
    requires:
      - name: odx-connectivity
      - name: odx-destination
      - name: odx-xsuaa
    parameters:
      command: node server/index.mjs
      memory: 256M
      buildpack: nodejs_buildpack
    build-parameters:
      ignore:
        - node_modules/

  # 3. FRONTEND: Explorer UI
  - name: odx-explorer
    type: nodejs
    path: packages/explorer/.output
    provides:
      - name: odx-explorer-url
        properties:
          url: ${default-url}
    requires:
      - name: odx-xsuaa
    parameters:
      command: node server/index.mjs
      memory: 256M
      buildpack: nodejs_buildpack
    build-parameters:
      ignore:
        - node_modules/

resources:
  - name: odx-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      config-path: xs-security.json

  - name: odx-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: odx-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
