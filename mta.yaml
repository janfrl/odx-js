_schema-version: "3.2"
ID: odx-proxy
version: 0.0.1
description: "ODX OData Proxy"

parameters:
  enable-parallel-deployments: true

modules:
  - name: odx-proxy
    type: nodejs
    path: packages/proxy/.output/server
    requires:
      - name: genericodataproxy-connectivity
      - name: genericodataproxy-destination
      - name: genericodataproxy-xsuaa
      - name: genericodataproxy-config
    parameters:
      command: node index.mjs
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: custom
      commands: []

resources:
  - name: genericodataproxy-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      config-path: xs-security.json

  - name: genericodataproxy-destination
    type: org.cloudfoundry.existing-service

  - name: genericodataproxy-connectivity
    type: org.cloudfoundry.existing-service

  - name: genericodataproxy-config
    type: org.cloudfoundry.existing-service
