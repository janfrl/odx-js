_schema-version: '3.2'
ID: odx-fullstack
version: 1.1.2
description: ODX OData Developer Experience - Standalone AppRouter Setup

parameters:
  enable-parallel-deployments: true
  xsuaa-subdomain: abap-development-bechtle-test

modules:
  # 1. GATEKEEPER: AppRouter
  - name: odx-approuter
    type: nodejs
    path: packages/approuter
    requires:
      - name: odx-xsuaa
      - name: odx-destination
      - name: odx-proxy-url
        group: destinations
        properties:
          name: odx-proxy-backend
          url: ~{url}
          forwardAuthToken: true
      - name: odx-explorer-url
        group: destinations
        properties:
          name: odx-explorer-ui
          url: ~{url}
          forwardAuthToken: true
    parameters:
      memory: 128M
      buildpack: nodejs_buildpack
      # Hostname beginnt mit der Subdomain für XSUAA-Erkennung
      host: ${xsuaa-subdomain}-odx
    build-parameters:
      ignore:
        - node_modules/
    properties:
      # Dieses universelle Pattern nimmt alles vor .cfapps als Tenant
      TENANT_HOST_PATTERN: "^(.*).cfapps.(.*).hana.ondemand.com"

  # 2. BACKEND: OData Proxy
  - name: odx-proxy
    type: nodejs
    path: packages/proxy/.output
    provides:
      - name: odx-proxy-url
        properties:
          url: ${default-url}
    requires:
      - name: odx-connectivity
      - name: odx-destination
      - name: odx-xsuaa
    parameters:
      command: node server/index.mjs
      memory: 256M
      buildpack: nodejs_buildpack
    build-parameters:
      ignore:
        - node_modules/

  # 3. FRONTEND: Explorer UI
  - name: odx-explorer
    type: nodejs
    path: packages/explorer/.output
    provides:
      - name: odx-explorer-url
        properties:
          url: ${default-url}
    requires:
      - name: odx-xsuaa
    parameters:
      command: node server/index.mjs
      memory: 256M
      buildpack: nodejs_buildpack
    build-parameters:
      ignore:
        - node_modules/

resources:
  - name: odx-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      config-path: xs-security.json
      service-keys:
        - name: odx-xsuaa-key

  - name: odx-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  - name: odx-connectivity
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite
